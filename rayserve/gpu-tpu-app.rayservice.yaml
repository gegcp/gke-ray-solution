# [START]
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: gpu-tpu-mix
spec:
  serveConfigV2: |
    applications:
    - name: gpu-app
      route_prefix: /gpu
      import_path: repvgg_gpu_app:model
      deployments:
      - name: RepVGGDeployment
        num_replicas: 1
        ray_actor_options:
          num_cpus: 2
          num_gpus: 1
      runtime_env:
        pip: ["torch", "torchvision", "pillow", "numpy", "fastapi", "ray==2.55.1"]
        env_vars:
          MODEL_VARIANT: "B0"
          NUM_CLASSES: "1000"
          USE_FP16: "true"
    - name: tpu-app
      route_prefix: /tpu
      import_path: repvgg_tpu_app:model
      deployments:
      - name: RepVGGDeployment
        num_replicas: 1
        ray_actor_options:
          num_cpus: 1
          resources: {"TPU": 1}
  rayClusterConfig:
    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: "0"
      template:
        metadata:
          labels:
            ai.gke.io: rayserve
        spec:
          containers:
          - name: ray-head
            image: us-central1-docker.pkg.dev/gpu-launchpad-playground/gech-ray-gke/ray-tpu:2.55.1
            resources:
              limits:
                cpu: "2"
                memory: "8Gi"
                ephemeral-storage: "20Gi"
              requests:
                cpu: "2"
                memory: "8Gi"
                ephemeral-storage: "20Gi"
            ports:
            - containerPort: 6379
              name: gcs-server
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
            - containerPort: 8000
              name: serve
            env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: hf_api_token
            - name: PYTHONPATH
              value: "/rayserve/apps:$PYTHONPATH"
            volumeMounts:
            - name: repvgg-apps
              mountPath: /rayserve/apps
              readOnly: true
          volumes:
          - name: repvgg-apps
            configMap:
              name: repvgg-apps
    workerGroupSpecs:
    - replicas: 1
      minReplicas: 0
      maxReplicas: 1
      groupName: gpu-group
      rayStartParams: {}
      template:
        metadata:
          labels:
            ai.gke.io: rayserve
        spec:
          containers:
          - name: llm
            image: rayproject/ray:2.55.1.68d0e4-extra-py312-cu128
            env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: hf_api_token
            - name: PYTHONPATH
              value: "/rayserve/apps:$PYTHONPATH"
            resources:
              limits:
                cpu: "4"
                memory: "20Gi"
                nvidia.com/gpu: "1"
                ephemeral-storage: "20Gi"
              requests:
                cpu: "4"
                memory: "20Gi"
                nvidia.com/gpu: "1"
                ephemeral-storage: "20Gi"
            volumeMounts:
            - name: repvgg-apps
              mountPath: /rayserve/apps
              readOnly: true
          volumes:
          - name: repvgg-apps
            configMap:
              name: repvgg-apps
          nodeSelector:
            cloud.google.com/gke-accelerator: nvidia-l4
    - groupName: tpu-group
      replicas: 1
      minReplicas: 0
      maxReplicas: 1
      numOfHosts: 1
      rayStartParams: {}
      template:
        metadata:
          annotations:
            # gke-gcsfuse/volumes: "true"
            # gke-gcsfuse/cpu-limit: "0"
            # gke-gcsfuse/memory-limit: "0"
            # gke-gcsfuse/ephemeral-storage-limit: "0"
        spec:
          containers:
            - name: ray-worker
              image: us-central1-docker.pkg.dev/gpu-launchpad-playground/gech-ray-gke/ray-tpu:2.55.1
              imagePullPolicy: Always
              resources:
                limits:
                  cpu: "1"
                  google.com/tpu: "1"
                  ephemeral-storage: 40G
                  memory: 20G
                requests:
                  cpu: "1"
                  google.com/tpu: "1"
                  ephemeral-storage: 40G
                  memory: 20G
              env:
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hf-secret
                      key: hf_api_token
                - name: PYTHONPATH
                  value: "/rayserve/apps:$PYTHONPATH"
                - name: MODEL_VARIANT
                  value: "B0"
                - name: NUM_CLASSES
                  value: "1000"
                - name: ENABLE_TPU
                  value: "true"
                - name: TPU_LIBRARY_PATH
                  value: "/home/ray/anaconda3/lib/python3.12/site-packages/libtpu/libtpu.so"
              volumeMounts:
              - name: dshm
                mountPath: /dev/shm
              - name: repvgg-apps
                mountPath: /rayserve/apps
                readOnly: true
          volumes:
          - name: dshm
            emptyDir:
              medium: Memory
          - name: repvgg-apps
            configMap:
              name: repvgg-apps
          nodeSelector:
            cloud.google.com/gke-tpu-accelerator: tpu-v6e-slice
            cloud.google.com/gke-tpu-topology: 1x1
# [END]
